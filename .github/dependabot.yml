version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 5
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - "@actions/*"
    cooldown:
      default-days: 5
